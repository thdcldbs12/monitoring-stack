apiVersion: v1
kind: ConfigMap
metadata:
  name: telegraf-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: telegraf
data:
  # 1. 메인 에이전트 및 출력 설정
  telegraf.conf: |
    [agent]
      interval = "30s"
      round_interval = true
      metric_batch_size = 1000
      metric_buffer_limit = 10000
      collection_jitter = "30s"
      flush_interval = "30s"
      flush_jitter = "0s"
      precision = ""
      hostname = "p1"
      debug = false
      omit_hostname = false

    [[outputs.influxdb]]
      urls = ["http://influxdb-svc:8086"]
      database = "system"
      timeout = "30s"

  # 2. APC PDU 상세 설정
  input_apc_pdu.conf: |
    [[inputs.snmp]]
      agents = ["172.28.230.231:161"]
      version = 2
      community = "public"
      name = "apc_pdu"
      unconnected_udp_socket = true

      [[inputs.snmp.field]]
        name = "serial_number"
        oid = ".1.3.6.1.4.1.318.1.1.12.1.6.0"
        is_tag = true
      [[inputs.snmp.field]]
        name = "pdu_name"
        oid = ".1.3.6.1.4.1.318.1.1.12.1.1.0"
      [[inputs.snmp.field]]
        name = "model_number"
        oid = ".1.3.6.1.4.1.318.1.1.12.1.5.0"
      [[inputs.snmp.field]]
        name = "Firmware"
        oid = ".1.3.6.1.4.1.318.1.1.12.1.3.0"
      [[inputs.snmp.field]]
        name = "TotalOutlet"
        oid = ".1.3.6.1.4.1.318.1.1.12.3.1.4.0"
      [[inputs.snmp.field]]
        name = "device_rating"
        oid = ".1.3.6.1.4.1.318.1.1.12.1.7.0"
      [[inputs.snmp.field]]
        name = "voltage"
        oid = ".1.3.6.1.4.1.318.1.1.12.1.15.0"
      [[inputs.snmp.field]]
        name = "watts"
        oid = ".1.3.6.1.4.1.318.1.1.12.1.16.0"
      [[inputs.snmp.field]]
        name = "va"
        oid = ".1.3.6.1.4.1.318.1.1.12.1.18.0"
      [[inputs.snmp.field]]
        name = "amps"
        oid = ".1.3.6.1.4.1.318.1.1.12.2.3.1.1.2.1"
      [[inputs.snmp.field]]
        name = "LoadStatus"
        oid = ".1.3.6.1.4.1.318.1.1.12.2.3.1.1.3.1"
      [[inputs.snmp.field]]
        name = "timeticks"
        oid = ".1.3.6.1.2.1.1.3.0"

      [[inputs.snmp.table]]
        name = "pdu_outlet_status"
        inherit_tags = ["serial_number"]
        [[inputs.snmp.table.field]]
          name = "outlet_index"
          oid = ".1.3.6.1.4.1.318.1.1.12.3.5.1.1.1"
          is_tag = true
        [[inputs.snmp.table.field]]
          name = "outlet_name"
          oid = ".1.3.6.1.4.1.318.1.1.12.3.5.1.1.2"
        [[inputs.snmp.table.field]]
          name = "outlet_state"
          oid = ".1.3.6.1.4.1.318.1.1.12.3.5.1.1.4"

  # 3. iDRAC (CPU, Disk, Memory, NIC 등 전체 포함)
  input_idrac.conf: |
      [[processors.regex]]
        [[processors.regex.fields]]
          key = "log-dates"
          pattern = "^(?P<YYYY>\\d{4})(?P<MM>\\d{2})(?P<DD>\\d{2})(?P<HH>\\d{2})(?P<mm>\\d{2})(?P<ss>\\d{2})\\.(?P<us>\\d+)(?P<tz>[-+]\\d{3,4})$"
          replacement = "${YYYY}-${MM}-${DD} ${HH}:${mm}:${ss}"
      
      
      [[inputs.snmp]]
        agents    = ["172.28.230.241:161", "172.28.228.10:161"]
        version   = 2
        community = "public"
        unconnected_udp_socket = true
        name      = "idrac-hosts"
      
      
      
      [[inputs.snmp.table]]
        name = "idrac-hosts"
        inherit_tags = ["system-name"]
      
      
      # systemBIOSVersionName
        [[inputs.snmp.table.field]]
          name = "bios-version"
          oid  = ".1.3.6.1.4.1.674.10892.5.4.300.50.1.8"
      
      # systemStateGlobalSystemStatus
        [[inputs.snmp.table.field]]
          name = "memory-status"
          oid  = ".1.3.6.1.4.1.674.10892.5.4.200.10.1.27"
      
      # systemStatePowerSupplyStatusCombined
        [[inputs.snmp.table.field]]
          name = "psu-status"
          oid  = ".1.3.6.1.4.1.674.10892.5.4.200.10.1.9"
      
      
      
      [[inputs.snmp.field]]
        name   = "system-name"
        oid    = ".1.3.6.1.2.1.1.5.0"
        is_tag = true
      
      # systemModelName
      [[inputs.snmp.field]]
        name = "system-model"
        oid  = ".1.3.6.1.4.1.674.10892.5.1.3.12.0"
      
      # drsSystemServiceTag
      [[inputs.snmp.field]]
        name = "system-servicetag"
        oid  = ".1.3.6.1.4.1.674.10892.5.1.3.2.0"
      
      # racVersion
      [[inputs.snmp.field]]
        name = "idrac-version"
        oid  = ".1.3.6.1.4.1.674.10892.5.1.1.5.0"
      
      # systemPowerState
      [[inputs.snmp.field]]
        name = "power-state"
        oid  = ".1.3.6.1.4.1.674.10892.5.2.4.0"
      
      # amperageProbeReading
      [[inputs.snmp.field]]
        name = "system-watts"
        oid  = ".1.3.6.1.4.1.674.10892.5.4.600.30.1.6.1.1"
      
      # alertSystemFQDN
      [[inputs.snmp.field]]
        name = "system-hostname"
        oid  = ".1.3.6.1.4.1.674.10892.5.1.3.1.0"
      
      # systemStateGlobalSystemStatus
      [[inputs.snmp.field]]
        name = "system-globalstatus"
        oid  = ".1.3.6.1.4.1.674.10892.5.2.1.0"
      
      # racURL
      [[inputs.snmp.field]]
        name = "idrac-url"
        oid  = ".1.3.6.1.4.1.674.10892.5.1.1.6.0"
      
      
      # coolingDeviceReading.1.1
      [[inputs.snmp.field]]
        name = "fan1-speed"
        oid  = ".1.3.6.1.4.1.674.10892.5.4.700.12.1.6.1.1"
      
      # coolingDeviceReading.1.2
      [[inputs.snmp.field]]
        name = "fan2-speed"
        oid  = ".1.3.6.1.4.1.674.10892.5.4.700.12.1.6.1.2"
      
      # coolingDeviceReading.1.3
      [[inputs.snmp.field]]
        name = "fan3-speed"
        oid  = ".1.3.6.1.4.1.674.10892.5.4.700.12.1.6.1.3"
      
      # coolingDeviceReading.1.4
      [[inputs.snmp.field]]
        name = "fan4-speed"
        oid  = ".1.3.6.1.4.1.674.10892.5.4.700.12.1.6.1.4"
      
      
      # coolingDeviceReading.1.5
      [[inputs.snmp.field]]
        name = "fan5-speed"
        oid  = ".1.3.6.1.4.1.674.10892.5.4.700.12.1.6.1.5"
      
      # coolingDeviceReading.1.6
      [[inputs.snmp.field]]
        name = "fan6-speed"
        oid  = ".1.3.6.1.4.1.674.10892.5.4.700.12.1.6.1.6"
      
      
      
      
      # temperatureProbeReading.1.1
      [[inputs.snmp.field]]
        name = "inlet-temp"
        oid  = ".1.3.6.1.4.1.674.10892.5.4.700.20.1.6.1.1"
      
      # temperatureProbeReading.1.2
      [[inputs.snmp.field]]
        name = "exhaust-temp"
        oid  = ".1.3.6.1.4.1.674.10892.5.4.700.20.1.6.1.2"
      
      # temperatureProbeReading.1.3
      [[inputs.snmp.field]]
        name = "cpu1-temp"
        oid  = ".1.3.6.1.4.1.674.10892.5.4.700.20.1.6.1.3"
      
      # temperatureProbeReading.1.4
      [[inputs.snmp.field]]
        name = "cpu2-temp"
        oid  = ".1.3.6.1.4.1.674.10892.5.4.700.20.1.6.1.4"
      
      
      
      [[inputs.snmp.table]]
        name = "idrac-disks"
        inherit_tags = ["system-name"]
      
      # physicalDiskName
        [[inputs.snmp.table.field]]
          name   = "disks-name"
          oid    = ".1.3.6.1.4.1.674.10892.5.5.1.20.130.4.1.2"
          is_tag = true
      
      # physicalDiskState
        [[inputs.snmp.table.field]]
          name = "disks-state"
          oid  = ".1.3.6.1.4.1.674.10892.5.5.1.20.130.4.1.4"
      
      # physicalDiskCapacityInMB
        [[inputs.snmp.table.field]]
          name = "disks-capacity"
          oid  = ".1.3.6.1.4.1.674.10892.5.5.1.20.130.4.1.11"
      
      # physicalDiskSmartAlertIndication
        [[inputs.snmp.table.field]]
          name = "disks-predictivefail"
          oid = ".1.3.6.1.4.1.674.10892.5.5.1.20.130.4.1.31"
      
      
      
      [[inputs.snmp.table]]
        name = "idrac-nics"
        inherit_tags = ["system-name"]
      
      # networkDeviceFQDD
        [[inputs.snmp.table.field]]
          name   = "nic-name"
          oid    = ".1.3.6.1.4.1.674.10892.5.4.1100.90.1.30"
          is_tag = true
      
      # networkDeviceConnectionStatus
        [[inputs.snmp.table.field]]
          name = "nic-status"
          oid  = ".1.3.6.1.4.1.674.10892.5.4.1100.90.1.4"
      
      # networkDeviceCurrentMACAddress
        [[inputs.snmp.table.field]]
          name       = "nic-current_mac"
          oid        = ".1.3.6.1.4.1.674.10892.5.4.1100.90.1.15"
          conversion = "hwaddr"
      
      
      
      [[inputs.snmp.table]]
        name = "idrac-memory"
        inherit_tags = ["system-name"]
      
      # memoryDeviceIndex
        [[inputs.snmp.table.field]]
          name   = "memory-index"
          oid    = ".1.3.6.1.4.1.674.10892.5.4.1100.50.1.2"
          is_tag = true
      
      # memoryDeviceSize
        [[inputs.snmp.table.field]]
          name = "memory-Size"
          oid  = ".1.3.6.1.4.1.674.10892.5.4.1100.50.1.14"
      
      #  memoryDeviceStatus
        [[inputs.snmp.table.field]]
          name = "memory-status"
          oid  = ".1.3.6.1.4.1.674.10892.5.4.1100.50.1.5"
      
      # memoryDeviceLocationName
        [[inputs.snmp.table.field]]
          name = "memory-location"
          oid = ".1.3.6.1.4.1.674.10892.5.4.1100.50.1.8"
      
      # memoryDeviceSerialNumberName
        [[inputs.snmp.table.field]]
          name = "memory-serial"
          oid = ".1.3.6.1.4.1.674.10892.5.4.1100.50.1.23"
      
      
      [[inputs.snmp.table]]
      name = "idrac-cpu"
      inherit_tags = [ "system-name" ]
      
      
      # processorDeviceStatus
      [[inputs.snmp.table.field]]
      name = "cpu-status"
      oid = ".1.3.6.1.4.1.674.10892.5.4.1100.30.1.5"
      
      # processorDeviceBrandName
      [[inputs.snmp.table.field]]
      name = "cpu-name"
      oid = ".1.3.6.1.4.1.674.10892.5.4.1100.30.1.23"
      
      # processorDeviceIndex
      [[inputs.snmp.table.field]]
      name = "cpu-index"
      oid = ".1.3.6.1.4.1.674.10892.5.4.1100.30.1.2"
      is_tag = true
      
      
